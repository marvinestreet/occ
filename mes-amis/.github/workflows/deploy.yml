# Build → push to ECR → roll the ECS service via app_deploy.
#
# Trigger: pushes to main that touch the Ruby app, Dockerfile, or the
# app_deploy stack. Pure terraform/infra changes are handled by terraform.yml.
#
# Flow:
#   1. Build the image and tag it with the commit SHA.
#   2. Push to ECR (URL is read from the infra remote state).
#   3. `terraform apply` in app_deploy with -var image_tag=<sha>; this writes
#      a new task def revision and the service rolls to it.
#   4. Wait for the service to reach steady state so a red deploy fails CI.
name: deploy

on:
  push:
    branches: [main]
    paths:
      - "app.rb"
      - "config.ru"
      - "Gemfile"
      - "Gemfile.lock"
      - "Rakefile"
      - "Dockerfile"
      - ".dockerignore"
      - "test/**"
      - "terraform/app_deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override the image tag to deploy (defaults to the commit SHA)."
        required: false

permissions:
  id-token: write
  contents: read

# Only one deploy at a time, but don't cancel a running deploy — let it
# finish (or the ECS rollback unwind cleanly) before the next one starts.
concurrency:
  group: app-deploy-main
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "0"
  TF_VAR_profile: ""

jobs:
  deploy:
    name: build and deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/monami-gha-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.0
          terraform_wrapper: false

      # Read ECR URL + cluster/service names from the infra remote state
      # rather than hardcoding them here.
      - name: read infra outputs
        id: infra
        working-directory: terraform/app_deploy
        run: |
          terraform init -lockfile=readonly
          ecr_url=$(terraform console <<< 'data.terraform_remote_state.infra.outputs.ecr_repository_url' | tr -d '"')
          cluster=$(terraform console <<< 'data.terraform_remote_state.infra.outputs.ecs_cluster_name' | tr -d '"')
          name_prefix=$(terraform console <<< 'data.terraform_remote_state.infra.outputs.name_prefix' | tr -d '"')
          echo "ecr_url=${ecr_url}" >> "$GITHUB_OUTPUT"
          echo "cluster=${cluster}" >> "$GITHUB_OUTPUT"
          echo "service=${name_prefix}-app" >> "$GITHUB_OUTPUT"

      - name: resolve image tag
        id: tag
        run: |
          tag="${{ github.event.inputs.image_tag }}"
          if [ -z "$tag" ]; then tag="${GITHUB_SHA::12}"; fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - name: build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.infra.outputs.ecr_url }}:${{ steps.tag.outputs.tag }}
            ${{ steps.infra.outputs.ecr_url }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: terraform apply app_deploy
        working-directory: terraform/app_deploy
        run: |
          terraform apply -auto-approve -var "image_tag=${{ steps.tag.outputs.tag }}"

      - name: wait for ECS service stable
        run: |
          aws ecs wait services-stable \
            --cluster "${{ steps.infra.outputs.cluster }}" \
            --services "${{ steps.infra.outputs.service }}"
